<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>풍양중 흑백교사전 - 개회식</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 동양풍 및 고급스러운 폰트 스택 */
        body {
            font-family: "Batang", "Gungsuh", "Noto Serif KR", serif;
            margin: 0;
            overflow: hidden; /* 스크롤 방지 */
            background-color: #000;
        }

        /* 텍스트 엠보싱 및 발광 효과 (사진 촬영 시 선명하게 보임) */
        .title-glow {
            text-shadow: 
                0px 4px 15px rgba(0, 0, 0, 0.8),
                0px 0px 40px rgba(212, 175, 55, 0.4),
                0px 0px 2px rgba(255, 255, 255, 0.8);
        }

        .hanja-glow {
            text-shadow: 0px 0px 20px rgba(212, 175, 55, 0.6);
        }

        /* 등장 애니메이션 */
        @keyframes fadeInScale {
            0% { opacity: 0; transform: scale(0.9); }
            100% { opacity: 1; transform: scale(1); }
        }
        
        @keyframes fadeLine {
            0% { height: 0; opacity: 0; }
            100% { height: 100%; opacity: 0.5; }
        }

        @keyframes fadeIn {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .animate-plate {
            animation: fadeInScale 2.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
        }

        .animate-line {
            animation: fadeLine 2s ease-out 1s forwards;
            opacity: 0;
        }

        .animate-button {
            animation: fadeIn 1.5s ease-out 2s forwards;
            opacity: 0;
        }
    </style>
</head>
<body>

    <!-- 전체 래퍼 -->
    <div class="relative w-full h-screen overflow-hidden flex cursor-default">
        
        <!-- ================= 배경 영역: 흑과 백의 대립 ================= -->
        <!-- 좌측 흑팀 배경 -->
        <div class="w-1/2 h-full bg-gradient-to-br from-[#0a0a0a] to-[#1a1a1a] relative overflow-hidden flex items-center justify-center">
            <!-- 거대한 배경 한자 (우아하게 배치) -->
            <div class="absolute text-[50vw] text-white opacity-[0.03] leading-none select-none font-bold transform -translate-x-12">
                黑
            </div>
            <!-- 빛 번짐 효과 -->
            <div class="absolute w-full h-full bg-[radial-gradient(circle_at_center,_rgba(212,175,55,0.05)_0%,_transparent_70%)]"></div>
        </div>

        <!-- 우측 백팀 배경 -->
        <div class="w-1/2 h-full bg-gradient-to-tl from-[#e0e0e0] to-[#ffffff] relative overflow-hidden flex items-center justify-center shadow-[-30px_0_50px_rgba(0,0,0,0.3)] z-0">
            <!-- 거대한 배경 한자 -->
            <div class="absolute text-[50vw] text-black opacity-[0.03] leading-none select-none font-bold transform translate-x-12">
                白
            </div>
        </div>

        <!-- 중앙 황금 경계선 -->
        <div class="absolute top-0 left-1/2 transform -translate-x-1/2 w-[2px] h-full bg-gradient-to-b from-transparent via-[#D4AF37] to-transparent z-10 animate-line"></div>

        <!-- ================= 파티클 효과 (캔버스) ================= -->
        <canvas id="bgCanvas" class="absolute inset-0 z-20 pointer-events-none"></canvas>

        <!-- ================= 중앙 명패 (사진 촬영용 메인 포커스) ================= -->
        <div class="absolute inset-0 z-30 flex items-center justify-center px-4 pointer-events-none">
            <!-- 반투명 블랙/골드 글래스모피즘 플레이트 -->
            <div class="bg-black/60 backdrop-blur-xl border border-[#D4AF37]/30 px-12 py-16 md:px-24 md:py-20 rounded-3xl shadow-[0_20px_70px_rgba(0,0,0,0.7),_inset_0_0_30px_rgba(212,175,55,0.1)] text-center animate-plate pointer-events-auto">
                
                <!-- 상단 연도 및 행사명 -->
                <div class="flex items-center justify-center gap-4 mb-8">
                    <div class="h-[1px] w-12 md:w-20 bg-[#D4AF37]/50"></div>
                    <p class="text-[#D4AF37] tracking-[0.5em] md:tracking-[0.8em] text-sm md:text-xl uppercase font-light">
                        2026 Pungyang Teachers' Match
                    </p>
                    <div class="h-[1px] w-12 md:w-20 bg-[#D4AF37]/50"></div>
                </div>

                <!-- 메인 한글 타이틀 (가장 크게) -->
                <h1 class="text-6xl md:text-8xl lg:text-[9rem] font-bold text-transparent bg-clip-text bg-gradient-to-b from-white via-[#f0f0f0] to-[#999999] tracking-[0.1em] title-glow leading-tight mb-4">
                    풍양중 흑백교사전
                </h1>

                <!-- 서브 한자 타이틀 -->
                <div class="flex items-center justify-center gap-8 mt-12">
                    <div class="h-[2px] w-20 md:w-32 bg-gradient-to-r from-transparent to-[#D4AF37]"></div>
                    <span class="text-4xl md:text-5xl lg:text-6xl text-[#D4AF37] tracking-[0.4em] hanja-glow font-bold">
                        黑白敎師戰
                    </span>
                    <div class="h-[2px] w-20 md:w-32 bg-gradient-to-l from-transparent to-[#D4AF37]"></div>
                </div>

                <!-- 시작하기 버튼 -->
                <div class="mt-16 animate-button">
                    <a href="index.html" class="group relative inline-flex items-center justify-center px-10 py-4 overflow-hidden rounded-full border border-[#D4AF37]/50 hover:border-[#D4AF37] transition-all duration-500 bg-black/40 hover:bg-[#D4AF37]/10 shadow-[0_0_15px_rgba(212,175,55,0.1)] hover:shadow-[0_0_30px_rgba(212,175,55,0.4)] cursor-pointer no-underline">
                        <span class="relative text-[#D4AF37] font-medium tracking-[0.3em] text-lg md:text-2xl group-hover:text-white transition-colors duration-500 flex items-center gap-4">
                            대결 시작하기
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="transform group-hover:translate-x-2 transition-transform duration-500"><path d="M5 12h14"></path><path d="m12 5 7 7-7 7"></path></svg>
                        </span>
                    </a>
                </div>

            </div>
        </div>

    </div>

    <!-- 스크립트: 우아한 금빛 파티클 애니메이션 -->
    <script>
        const canvas = document.getElementById('bgCanvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        let animationFrameId;

        // 캔버스 크기 맞춤
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            initParticles();
        }
        window.addEventListener('resize', resizeCanvas);

        // 파티클 객체 정의
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2.5 + 0.5; // 미세한 금가루 크기
                // 천천히 위로 상승하며 좌우로 흔들림
                this.speedY = (Math.random() * 0.5) + 0.2; 
                this.speedX = (Math.random() * 0.4) - 0.2;
                
                // 빛나는 금색 계열
                const colors = ['#D4AF37', '#F3E5AB', '#AA8000', 'rgba(255,255,255,0.8)'];
                this.color = colors[Math.floor(Math.random() * colors.length)];
                
                // 반짝임 효과용
                this.alpha = Math.random();
                this.alphaChange = (Math.random() * 0.02) - 0.01;
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;

                // 화면 위로 벗어나면 아래에서 재설정
                if (this.y < 0) {
                    this.y = canvas.height;
                    this.x = Math.random() * canvas.width;
                }

                // 반짝임 (투명도 변화)
                this.alpha += this.alphaChange;
                if (this.alpha <= 0.1 || this.alpha >= 0.9) {
                    this.alphaChange = -this.alphaChange;
                }
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.alpha;
                ctx.fill();
                ctx.globalAlpha = 1.0;
            }
        }

        // 파티클 초기화
        function initParticles() {
            particlesArray = [];
            // 화면 크기에 비례하여 파티클 개수 조절 (은은하게 유지)
            const numberOfParticles = (canvas.width * canvas.height) / 15000;
            for (let i = 0; i < numberOfParticles; i++) {
                particlesArray.push(new Particle());
            }
        }

        // 애니메이션 루프
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particlesArray.length; i++) {
                particlesArray[i].update();
                particlesArray[i].draw();
            }
            animationFrameId = requestAnimationFrame(animate);
        }

        // 페이지 로드 시 실행
        resizeCanvas();
        animate();
    </script>
</body>
</html>
